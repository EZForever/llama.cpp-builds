name: build-vulkan-radv

on:
  # Build file modifications
  push:
    branches: [ 'master' ]
    paths: [
      '.github/workflows/build-vulkan-radv.yml',
      '.devops/*-vulkan-radv.Dockerfile',
      '!.devops/base-vulkan-radv.Dockerfile',
    ]
  #pull_request:
  #  branches: [ 'master' ]

  # Daily rebuild
  schedule:
    - cron: "0 4 * * *"

  # Manual rebuild, in case of some important upstream change
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        image: [ tools ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout llama.cpp
        id: checkout_llamacpp
        uses: actions/checkout@v6
        with:
          repository: ggml-org/llama.cpp
          path: llama.cpp
          fetch-depth: 0
          filter: tree:0

      # XXX: `vulkan-shaders-gen` run shader compilers in parallel and have a chance of exhausting memory
      # Set a swap space to spill the memory spike to disk
      # Inspired from https://github.com/ggml-org/llama.cpp/issues/24393#issuecomment-4671721829
      - name: Set swap space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 16

      - name: Build and push Docker image (${{ matrix.image }})
        uses: macbre/push-to-ghcr@v16
        with:
          dockerfile: .devops/${{ matrix.image }}-vulkan-radv.Dockerfile
          context: .
          image_name: ${{ github.repository }}
          image_tag: ${{ matrix.image }}-vulkan-radv
          github_token: ${{ secrets.GHCR_ACCESS_TOKEN }}
          extra_args: >-
            --target target
            --label org.opencontainers.image.title="llama.cpp"
            --label org.opencontainers.image.description="LLM inference in C/C++"
            --label org.opencontainers.image.url="https://github.com/ggml-org/llama.cpp"
            --label org.opencontainers.image.version=${{ steps.checkout_llamacpp.outputs.commit }}

