name: build-opencl-intel

on:
  # Build file modifications
  push:
    branches: [ 'master' ]
    paths: [
      '.github/workflows/build-opencl-intel.yml',
      '.devops/*-opencl-intel.Dockerfile',
      '!.devops/base-opencl-intel.Dockerfile'
    ]
  #pull_request:
  #  branches: [ 'master' ]

  # Daily rebuild
  schedule:
    - cron: "0 4 * * *"

  # Manual rebuild, in case of some important upstream change
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        image: [ tools ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout llama.cpp
        id: checkout_llamacpp
        uses: actions/checkout@v6
        with:
          repository: ggml-org/llama.cpp
          path: llama.cpp
          fetch-depth: 0
          filter: tree:0

      - name: Build and push Docker image (${{ matrix.image }})
        uses: macbre/push-to-ghcr@v16
        with:
          dockerfile: .devops/${{ matrix.image }}-opencl-intel.Dockerfile
          context: .
          image_name: ${{ github.repository }}
          image_tag: ${{ matrix.image }}-opencl-intel
          github_token: ${{ secrets.GHCR_ACCESS_TOKEN }}
          extra_args: >-
            --target target
            --label org.opencontainers.image.title="llama.cpp"
            --label org.opencontainers.image.description="LLM inference in C/C++"
            --label org.opencontainers.image.url="https://github.com/ggml-org/llama.cpp"
            --label org.opencontainers.image.version=${{ steps.checkout_llamacpp.outputs.commit }}

